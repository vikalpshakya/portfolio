name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --base=/portfolio/

      - name: Prepare Pages artifact
        run: |
          if [ -f dist/index.html ]; then
            pages_dir=dist
          elif [ -f dist/client/index.html ]; then
            rm -rf dist-pages
            cp -R dist/client dist-pages
            pages_dir=dist-pages
          else
            echo "Build output not found."
            find dist -maxdepth 3 -type f | sort || true
            exit 1
          fi

          cp "$pages_dir/index.html" "$pages_dir/404.html"
          echo "PAGES_DIR=$pages_dir" >> "$GITHUB_ENV"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.PAGES_DIR }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4