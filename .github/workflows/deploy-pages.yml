name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --base=/portfolio/

      - name: Generate static Pages HTML
        run: |
          node --input-type=module <<'EOF'
          import { mkdir, writeFile } from 'node:fs/promises';

          const handlerModule = await import('./dist/server/server.js');
          const handler = handlerModule.default ?? handlerModule;

          if (!handler || typeof handler.fetch !== 'function') {
            throw new Error('Server bundle does not export a fetch handler.');
          }

          const response = await handler.fetch(
            new Request('https://vikalpshakya.github.io/portfolio/'),
            {},
            {},
          );

          if (!response.ok) {
            throw new Error(`Server render failed with status ${response.status}`);
          }

          const html = await response.text();

          await mkdir('dist/client', { recursive: true });
          await writeFile('dist/client/index.html', html);
          await writeFile('dist/client/404.html', html);
          EOF

          echo "PAGES_DIR=dist/client" >> "$GITHUB_ENV"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.PAGES_DIR }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4